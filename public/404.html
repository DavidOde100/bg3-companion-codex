<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Lost in the Forgotten Realms</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <main class="container error-page">

        <section class="error-card">

            <h1 class="error-code">404</h1>

            <h2>You Have Lost Your Way, Adventurer</h2>

            <p>
                The path you seek does not exist within the Forgotten Realms.
                Perhaps a mind flayer tampered with your route, or a mischievous
                imp has led you astray.
            </p>

            <p>
                Return to the Tavern Codex and continue your journey through
                Baldur's Gate.
            </p>

            <a href="/" role="button" class="home-btn">
                Return to Tavern Codex
            </a>

        </section>

    </main>

</body>
</html>
